name: build

on:
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit-hooks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Check all pre-commit hooks
        run: |
          uv run poe pre-commit

  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # This job dynamically creates a matrix strategy specifying the Python versions contained in python-matrix.json
  gather-python-versions:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v6

      - id: set-matrix
        run: |
          JSON_CONTENTS=$(cat .github/workflows/python-matrix.json)
          echo "matrix=$JSON_CONTENTS" >> $GITHUB_OUTPUT

  type-checking:
    runs-on: ubuntu-latest

    needs: gather-python-versions

    strategy:
      matrix: ${{ fromJSON(needs.gather-python-versions.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Type checking with Pyright
        run: |
          uv run --all-groups poe types

  unit-tests:
    runs-on: ubuntu-latest

    needs: gather-python-versions

    strategy:
      matrix: ${{ fromJSON(needs.gather-python-versions.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run all unit tests
        run: |
          uv run poe unit-tests

  lint:
    runs-on: ubuntu-latest

    needs: gather-python-versions

    strategy:
      matrix: ${{ fromJSON(needs.gather-python-versions.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Lint Python with Ruff
        run: |
          uv run poe lint

  # This job aggregates required matrix jobs into a single pass/fail
  required-checks:
    runs-on: ubuntu-latest

    needs: [pre-commit-hooks, secrets, type-checking, unit-tests, lint]
    if: always()

    steps:
      - run: ${{ !contains(needs.*.result, 'failure') }}

  publish:
    runs-on: ubuntu-latest

    # Only publish if this is a passing version-tag push to main OR a manual workflow_dispatch
    needs: [required-checks]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: astral-sh/setup-uv@v7

      - name: Build package
        run: |
          uv build

      - name: Publish to internal PyPI
        run: |
          uv publish
