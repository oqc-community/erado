name: build

on: [push]

jobs:
  type-checking:
    runs-on:
      group: gha-oqc-tech

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/init

      - name: Install erado
        run: |
          poetry install

      - name: Type checking with Pyright
        run: |
          poetry run poe types

  pre-commit-hooks:
    runs-on:
      group: gha-oqc-tech

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/init

      - name: Install erado
        run: |
          poetry install

      - name: Check all pre-commit hooks
        run: |
          poetry run poe pre-commit

  unit-tests:
    runs-on:
      group: gha-oqc-tech

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/init

      - name: Install erado
        run: |
          poetry install

      - name: Run all unit tests
        run: |
          poetry run poe unit-tests

  lint:
    runs-on:
      group: gha-oqc-tech

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/init

      - name: Install erado
        run: |
          poetry install

      - name: Lint Python with Ruff
        run: |
          poetry run poe lint
