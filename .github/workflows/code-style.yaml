name: code-style

on: [push]

jobs:
  lint:
    runs-on:
      group: gha-oqc-tech

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/init

      - name: Install erado
        run: |
          poetry install

      - name: Lint Python with Ruff
        run: |
          poetry run poe lint
