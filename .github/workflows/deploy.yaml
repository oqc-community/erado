name: deploy

on:
  workflow_run:
    workflows: [build]
    types: [completed]
    branches: [main]

jobs:
  build-and-publish:
    runs-on:
      group: gha-oqc-tech

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/init

      - name: Build package
        run: |
          uv build

      - name: Publish to internal PyPI
        run: |
          uv publish \
            --publish-url ${{ vars.INTERNAL_PYPI_URL }} \
            --username ${{ secrets.INTERNAL_PYPI_USERNAME }} \
            --password ${{ secrets.INTERNAL_PYPI_PASSWORD }}
