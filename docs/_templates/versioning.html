{% if versions %}
    <h3>{{ _('Stable') }}</h3>
    <ul>
        {%- for item in versions.releases %}
            <li><a href="{{ item.url }}">{{ item.name }}</a></li>
        {%- endfor %}
    </ul>
    <h3>{{ _('Development') }}</h3>
    <ul>
        {%- for item in versions.in_development %}
            <li><a href="{{ item.url }}">{{ item.name }}</a></li>
        {%- endfor %}
    </ul>
{% endif %}
